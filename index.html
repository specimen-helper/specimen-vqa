<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>标本留取智能助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:#f5f7fa;color:#1e293b;min-height:100vh}
.app{max-width:480px;margin:0 auto;background:#f5f7fa}

/* 头部 - 紧凑 */
.header{background:linear-gradient(135deg,#667eea,#764ba2);padding:10px 14px;text-align:center;position:relative}
.header h1{color:#fff;font-size:16px;font-weight:700}
.header p{color:rgba(255,255,255,.8);font-size:11px;margin-top:2px}
.header .tag{position:absolute;top:6px;right:10px;background:rgba(255,255,255,.2);color:#fff;font-size:9px;padding:2px 8px;border-radius:20px}

/* 内容 - 紧凑 */
.main{padding:8px 10px 16px}
.tip{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:12px;color:#92400e}

/* 拍照区 - 紧凑 */
.cam{background:#fff;border-radius:12px;padding:10px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}

/* 类型选择 - 紧凑 */
.typebar{margin-bottom:8px}
.typebar .tt{font-size:12px;font-weight:700;color:#374151;margin-bottom:6px}
.typebar .tt::before{content:'🧫 '}
.typelist{display:flex;flex-wrap:wrap;gap:6px}
.typebtn{padding:6px 10px;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:16px;font-size:12px;color:#475569;cursor:pointer;font-family:inherit;-webkit-appearance:none;transition:all .2s}
.typebtn:active{transform:scale(.95)}
.typebtn.on{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(102,126,234,.3)}
.typebtn .check{display:none;margin-right:3px}
.typebtn.on .check{display:inline}

/* 拍照框 - 紧凑 */
.frame{width:100%;aspect-ratio:16/9;background:#f8fafc;border:2px dashed #d1d5db;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:all .3s;min-height:140px}
.frame.on{background:#f0fdff;border-color:#06b6d4;border-style:solid}
.frame:active{transform:scale(.98)}
.frame .ico{font-size:32px;margin-bottom:4px}
.frame .txt{font-size:14px;font-weight:600;color:#1e293b}
.frame .sub{font-size:11px;color:#64748b;margin-top:2px}
.frame .preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:1}
.scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#06b6d4,transparent);box-shadow:0 0 8px #06b6d4;animation:scan 2s linear infinite;display:none;z-index:2}
.frame.on .scan{display:block}
@keyframes scan{0%{top:5%;opacity:0}15%{opacity:1}85%{opacity:1}100%{top:95%;opacity:0}}

/* 结果 - 紧凑 */
.res{margin-top:8px;padding:8px 10px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:10px;border:1px solid #a7f3d0;display:none}
.res.bad{background:linear-gradient(135deg,#fef2f2,#fecaca);border-color:#fca5a5}
.res.show{display:block}
.res .head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.res .badge{background:#10b981;color:#fff;padding:2px 8px;border-radius:16px;font-size:10px;font-weight:600}
.res.bad .badge{background:#ef4444}
.res .row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(167,243,208,.4);font-size:12px}
.res.bad .row{border-bottom-color:rgba(252,165,165,.4)}
.res .row:last-child{border:none}
.res .lab{color:#64748b}
.res .val{font-weight:600}
.res.bad .val{color:#ef4444}
.res .ai{margin-top:6px;padding:6px 8px;background:#fff;border-radius:8px;font-size:12px;line-height:1.6}
.res .ai strong{color:#4f46e5}
.res.bad .ai strong{color:#ef4444}

/* 推荐 - 紧凑 */
.pre{background:#fff;border-radius:12px;padding:8px 10px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04);display:none}
.pre.show{display:block}
.pre .tit{font-size:12px;font-weight:700;margin-bottom:6px}
.pre .tit::before{content:'🔮 '}
.pre .tags{display:flex;flex-wrap:wrap;gap:6px}
.pre .tag{padding:5px 10px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);border:1px solid #c7d2fe;border-radius:14px;font-size:11px;color:#4f46e5;cursor:pointer;font-family:inherit;-webkit-appearance:none;border:none}
.pre .tag:active{transform:scale(.95)}

/* 聊天 - 紧凑 */
.chat{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:8px}
.chat .bar{background:linear-gradient(135deg,#667eea,#764ba2);padding:8px 10px;display:flex;align-items:center;gap:8px}
.chat .bar .av{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px}
.chat .bar .tit{color:#fff;font-size:14px;font-weight:600}
.chat .body{padding:8px 10px}

/* 消息区 - 紧凑 */
.msgs{height:160px;overflow-y:auto;margin-bottom:8px;border:1.5px solid #cbd5e1;border-radius:10px;background:#f8fafc;padding:8px}
.msgs .welcome{text-align:center;padding:12px 8px;color:#64748b;font-size:12px;line-height:1.6}
.bub{max-width:90%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.6;margin-bottom:8px;word-break:break-word}
.bub.u{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.bub.a{background:#fff;color:#1e293b;border:1px solid #cbd5e1;border-bottom-left-radius:4px}
.bub.a .name{font-size:11px;color:#6366f1;font-weight:700;margin-bottom:2px}

/* 快捷标签 - 紧凑 */
.qwrap{overflow-x:auto;margin-bottom:6px}
.qwrap::-webkit-scrollbar{display:none}
.qlist{display:flex;gap:6px;white-space:nowrap;padding:1px}
.qtag{padding:5px 10px;background:#eff6ff;border:1px solid #dbeafe;border-radius:20px;font-size:11px;color:#4f46e5;cursor:pointer;font-family:inherit;-webkit-appearance:none;border:none}
.qtag:active{transform:scale(.95)}

/* 输入 - 紧凑 */
.inwrap{display:flex;gap:8px;padding-top:6px;border-top:1px solid #e2e8f0}
.inwrap input{flex:1;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:20px;font-size:13px;outline:none;background:#f5f7fa;-webkit-appearance:none}
.inwrap input:focus{border-color:#6366f1;background:#fff}
.inwrap button{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;-webkit-appearance:none}
.inwrap button:active{transform:scale(.92)}

/* 底部 - 紧凑 */
.foot{text-align:center;padding:6px;font-size:10px;color:#64748b;line-height:1.5}
.foot .bad{display:inline-block;background:linear-gradient(135deg,#dbeafe,#e9d5ff);color:#4f46e5;padding:2px 8px;border-radius:16px;font-size:10px;font-weight:600;margin-bottom:2px}

/* 打字 - 紧凑 */
.type{display:flex;gap:3px;padding:6px 8px}
.type span{width:6px;height:6px;background:#818cf8;border-radius:50%;animation:b 1.4s infinite}
.type span:nth-child(2){animation-delay:.2s}
.type span:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* 重新拍照 - 紧凑 */
.rebtn{margin-top:6px;text-align:center;display:none}
.rebtn.show{display:block}
.rebtn button{padding:5px 14px;background:#f1f5f9;border:1.5px solid #cbd5e1;border-radius:16px;font-size:12px;color:#475569;cursor:pointer;font-family:inherit}
.rebtn button:active{background:#e2e8f0}

/* 提示条 - 紧凑 */
.hint{margin-top:6px;padding:5px 8px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;font-size:11px;color:#991b1b;display:none}
.hint.show{display:block}

/* 状态条 - 紧凑 */
.statusbar{margin-top:6px;padding:5px 8px;background:#eff6ff;border:1px solid #dbeafe;border-radius:6px;font-size:11px;color:#1e40af;display:none}
.statusbar.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="tag">AI版</span>
    <div style="font-size:20px;margin-bottom:2px">🧪</div>
    <h1>标本留取智能助手</h1>
    <p>通义千问VL · 多模态AI视觉识别</p>
  </div>
  <div class="main">
    <div class="tip">💡 选择标本类型后拍照，AI自动识别并评估质量</div>

    <div class="cam">
      <div class="typebar">
        <div class="tt">请选择标本类型</div>
        <div class="typelist" id="typelist">
          <button class="typebtn" data-idx="0"><span class="check">✓</span>尿液</button>
          <button class="typebtn" data-idx="1"><span class="check">✓</span>粪便</button>
          <button class="typebtn" data-idx="2"><span class="check">✓</span>血液</button>
          <button class="typebtn" data-idx="3"><span class="check">✓</span>痰液</button>
          <button class="typebtn" data-idx="4"><span class="check">✓</span>血培养</button>
          <button class="typebtn" data-idx="5"><span class="check">✓</span>糖耐量</button>
        </div>
      </div>

      <input type="file" id="fileInput" accept="image/*" style="display:none">

      <div class="frame" id="frame">
        <div class="scan"></div>
        <img class="preview" id="preview" alt="preview">
        <div class="ico" id="fico">📷</div>
        <div class="txt" id="ftxt">请先选择标本类型</div>
        <div class="sub" id="fsub">选择后点击拍照</div>
      </div>

      <div class="hint" id="hint">⚠️ 请先选择标本类型</div>
      <div class="statusbar" id="statusbar">🤖 AI视觉分析中...</div>

      <div class="rebtn" id="rebtn">
        <button onclick="resetPhoto()">🔄 重新拍照</button>
      </div>

      <div class="res" id="res">
        <div class="head"><span class="badge" id="rbadge">✓ 识别成功</span><span id="rscore" style="font-size:11px;color:#10b981;font-weight:600">置信度 高</span></div>
        <div class="row"><span class="lab">标本类型</span><span class="val" id="rtype">—</span></div>
        <div class="row"><span class="lab">容器类型</span><span class="val" id="rbox">—</span></div>
        <div class="row"><span class="lab">识别结果</span><span class="val" id="rvol">—</span></div>
        <div class="row"><span class="lab">状态评估</span><span class="val" id="rstatus">—</span></div>
        <div class="ai" id="rai"></div>
      </div>
    </div>

    <div class="pre" id="pre">
      <div class="tit">根据识别结果，您可能想问</div>
      <div class="tags" id="ptags"></div>
    </div>

    <div class="chat">
      <div class="bar"><div class="av">💬</div><div class="tit">标本助手 · 智能问答</div></div>
      <div class="body">
        <div class="msgs" id="msgs">
          <div class="welcome" id="wel">您好！我是标本采集AI助手<br>支持AI视觉识别 + 知识问答<br>点击下方问题或输入您的问题</div>
        </div>
        <div class="qwrap">
          <div class="qlist" id="qlist">
            <button class="qtag" data-q="空腹能喝水吗？">空腹能喝水吗</button>
            <button class="qtag" data-q="尿液怎么留？">尿液怎么留</button>
            <button class="qtag" data-q="粪便留多少？">粪便留多少</button>
            <button class="qtag" data-q="月经能留尿吗？">月经能留尿吗</button>
            <button class="qtag" data-q="采血后淤青怎么办？">采血后淤青</button>
            <button class="qtag" data-q="抗凝管怎么选？">抗凝管怎么选</button>
            <button class="qtag" data-q="糖耐量流程？">糖耐量流程</button>
            <button class="qtag" data-q="24小时尿怎么留？">24小时尿</button>
          </div>
        </div>
        <div class="inwrap">
          <input type="text" id="inp" placeholder="请输入问题...">
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>

    <div class="foot">
      <div class="bad">📊 通义千问VL多模态大模型 · 6类标本全覆盖</div>
      <div>不合格率降低77% · 宣教时间缩短73%</div>
    </div>
  </div>
</div>

<script>
var API_URL = 'https://analyze-oqjhilhxmo.cn-hangzhou.fcapp.run/analyze';

var scenes=[
  {type:'尿液标本',box:'无菌尿杯',vol:'约 15ml ✓ 达标（≥8ml）',status:'容器完好，留取量充足',score:'置信度 高',
   tip:'<strong>💡 AI 指导：</strong>标本为常规尿液检查，留取量充足。请确认已留取<strong>中段尿</strong>（先排出一部分尿液后，不中断尿流直接接取）。请在<strong>2小时内</strong>送检。女性请避开月经期，留取前用清水清洁外阴。',
   pre:['中段尿怎么留？','24小时尿怎么留？','月经期能验尿吗？','尿常规要多少尿？']},
  {type:'粪便标本',box:'粪便采集盒',vol:'约 5g ✓ 达标（一平勺）',status:'留取量合格，容器密封完好',score:'置信度 高',
   tip:'<strong>💡 AI 指导：</strong>标本为粪便常规检查，留取量<strong>一平勺（约5g）达标</strong>。如为潜血检查，检查前3天请禁食动物血、肝脏、瘦肉及大量绿叶蔬菜，停用铁剂和维生素C。尽量1小时内送检。',
   pre:['一平勺是多少？','潜血检查要注意什么？','大便培养怎么留？','送检时效多久？']},
  {type:'血液标本',box:'紫头管（EDTA-K₂）',vol:'采血量充足 ✓',status:'无溶血，无凝块，混匀充分',score:'置信度 高',
   tip:'<strong>💡 AI 指导：</strong>标本为<strong>紫头管</strong>，适用于血常规、血型、交叉配血等项目。采血后请<strong>充分颠倒混匀8次</strong>，避免凝块。<br><strong>多管顺序：</strong>血培养→蓝→紫→绿→灰→黄。请在2小时内送检。',
   pre:['空腹能喝水吗？','采血后淤青怎么办？','多管采血顺序？','抗凝管怎么选？']},
  {type:'痰液标本',box:'无菌痰盒',vol:'约 4ml ✓ 达标（≥3ml）',status:'黏稠度合格，未见唾液混入',score:'置信度 高',
   tip:'<strong>💡 AI 指导：</strong>标本为痰液检查，留取量<strong>4ml达标</strong>，黏稠度合格。请确认已<strong>充分漱口</strong>，并深咳出肺部痰液。如为结核菌检查，建议连续3天留取<strong>清晨第一口痰</strong>，阳性率最高。',
   pre:['怎么避免唾液混入？','结核菌检查要求？','儿童怎么留痰？','痰培养怎么留？']},
  {type:'血培养标本',box:'血培养瓶（需氧+厌氧）',vol:'10ml/瓶 ✓ 达标',status:'容器密封完好，无破损',score:'置信度 高',
   tip:'<strong>💡 AI 指导：</strong>血培养标本量充足，容器完好。① 采血时机选择<strong>寒战或发热初期</strong>最佳 ② 成人每瓶8-10ml，需氧瓶+厌氧瓶各一份 ③ <strong>立即送检</strong>，室温放置不超过2小时',
   pre:['血培养采血量？','什么时候采血最好？','脑脊液怎么运送？','厌氧菌标本注意？']},
  {type:'糖耐量试验（OGTT）',box:'灰头管（氟化钠）',vol:'5个时间点采血 ✓',status:'试验流程完整，采血管正确',score:'置信度 高',
   tip:'<strong>💡 AI 指导：</strong>OGTT试验流程确认完整：① 空腹抽血 ② 5分钟内喝完75g葡萄糖溶液（250-300ml） ③ 分别于30min、1h、2h、3h抽血 ④ 试验期间<strong>静坐，不进食、不吸烟</strong>',
   pre:['OGTT前能吃东西吗？','喝糖水吐了怎么办？','激素水平检测时间？','哪些药影响检测？']}
];

var selectedType=-1;
var isScanning=false;

var frame=document.getElementById('frame');
var fileInput=document.getElementById('fileInput');
var preview=document.getElementById('preview');
var fico=document.getElementById('fico');
var ftxt=document.getElementById('ftxt');
var fsub=document.getElementById('fsub');
var rebtn=document.getElementById('rebtn');
var hint=document.getElementById('hint');
var statusbar=document.getElementById('statusbar');

var typebtns=document.querySelectorAll('.typebtn');
for(var i=0;i<typebtns.length;i++){
  typebtns[i].addEventListener('click',function(){
    for(var j=0;j<typebtns.length;j++)typebtns[j].classList.remove('on');
    this.classList.add('on');
    selectedType=parseInt(this.getAttribute('data-idx'));
    var name=scenes[selectedType].type;
    ftxt.textContent='已选择：'+name;
    fsub.textContent='点击此处拍照或选图';
    hint.classList.remove('show');
  });
}

function onFrameClick(e){
  e.preventDefault();
  e.stopPropagation();
  if(isScanning)return;
  if(selectedType<0){
    hint.classList.add('show');
    frame.style.animation='shake .4s';
    setTimeout(function(){frame.style.animation=''},400);
    return;
  }
  hint.classList.remove('show');
  fileInput.click();
}

frame.addEventListener('click',onFrameClick);
frame.addEventListener('touchstart',function(e){e.preventDefault();onFrameClick(e);},{passive:false});

fileInput.addEventListener('change',function(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    preview.src=ev.target.result;
    preview.style.display='block';
    fico.style.display='none';
    ftxt.textContent='图片已加载，准备AI分析...';
    fsub.textContent='请稍候';
    doScan();
  };
  reader.readAsDataURL(file);
});

function resetPhoto(){
  preview.style.display='none';
  preview.src='';
  fico.style.display='block';
  var name=selectedType>=0?scenes[selectedType].type:'';
  ftxt.textContent=selectedType>=0?'已选择：'+name:'请先选择上方标本类型';
  fsub.textContent=selectedType>=0?'点击此处拍照或选图':'选择后点击此处拍照';
  document.getElementById('res').classList.remove('show','bad');
  document.getElementById('pre').classList.remove('show');
  rebtn.classList.remove('show');
  statusbar.classList.remove('show');
  fileInput.value='';
}

function doScan(){
  if(isScanning||selectedType<0)return;
  isScanning=true;
  frame.classList.add('on');
  var r=document.getElementById('res');
  var p=document.getElementById('pre');
  r.classList.remove('show','bad');
  p.classList.remove('show');
  rebtn.classList.remove('show');
  statusbar.classList.add('show');

  var base64 = preview.src.split(',')[1];
  ftxt.textContent='AI视觉分析中...';
  fsub.textContent='正在调用通义千问VL';

  fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({image: base64})
  })
  .then(function(res){return res.json()})
  .then(function(data){
    frame.classList.remove('on');
    statusbar.classList.remove('show');
    if(data.success && data.data){
      showAIResult(data.data);
    } else {
      fallbackLocal();
    }
    isScanning=false;
  })
  .catch(function(err){
    frame.classList.remove('on');
    statusbar.classList.remove('show');
    console.error('API调用失败:', err);
    fallbackLocal();
    isScanning=false;
  });
}

function showAIResult(data){
  var r=document.getElementById('res');
  var rb=document.getElementById('rbadge');
  var rs=document.getElementById('rscore');
  var rv=document.getElementById('rvol');

  if(data.qualified === false){
    r.classList.add('bad');
    rb.textContent='✗ 识别异常';
    rs.style.color='#ef4444';
    rv.style.color='#ef4444';
  } else {
    r.classList.remove('bad');
    rb.textContent='✓ 识别成功';

  var preQs = getPreQuestions(data.type);

    var b=document.createElement('button');

  }

  rebtn.classList.add('show');
}

  // ===== 通用/默认 =====
  ' default':'感谢您的提问！我已记录并将结合护理与检验规范为您解答。<br><br>您可以尝试询问以下常见问题：<br>• 空腹能喝水吗 / 空腹多久 / 尿液怎么留 / 粪便留多少<br>• 抗凝管怎么选 / 多管采血顺序 / 采血后淤青怎么办<br>• 月经能留尿吗 / 24小时尿怎么留<br>• 糖耐量流程 / 潜血检查要注意什么<br>• 痰培养怎么留 / 血培养采血量'
};

var qtags=document.querySelectorAll('#qlist .qtag');
for(var i=0;i<qtags.length;i++){
  qtags[i].addEventListener('click',function(){sendQ(this.getAttribute('data-q'))});
}

document.getElementById('sendBtn').addEventListener('click',doSend);
document.getElementById('inp').addEventListener('keypress',function(e){if(e.key==='Enter')doSend()});

function sendQ(q){
  addMsg(q,'u');
  showType(function(){addMsg(findA(q),'a')});
}

function doSend(){
  var inp=document.getElementById('inp');
  var t=inp.value.trim();
  if(!t)return;
  addMsg(t,'u');
  inp.value='';
  showType(function(){addMsg(findA(t),'a')});
}

function findA(t){
  var lowerT = t.toLowerCase();
  // 精确匹配优先
  for(var k in qa){
    if(k===' default')continue;
    if(t.indexOf(k)>=0 || k.indexOf(t)>=0)return qa[k];
  }
  // 模糊匹配：关键词包含
  var keywords = {
    '空腹': ['空腹能喝水吗','空腹多久'],
    '喝水': ['空腹能喝水吗'],
    '多久': ['空腹多久'],
    '几小时': ['空腹多久'],
    '多长时间': ['空腹多久'],
    '尿': ['尿液怎么留'],
    '中段尿': ['中段尿怎么留'],
    '24小时尿': ['24小时尿怎么留'],
    '月经': ['月经能留尿吗'],
    '粪便': ['粪便留多少'],
    '大便': ['粪便留多少'],
    '留多少': ['粪便留多少'],
    '一平勺': ['一平勺是多少'],
    '潜血': ['潜血检查要注意什么'],
    '抗凝管': ['抗凝管怎么选'],
    '采血管': ['抗凝管怎么选'],
    '多管': ['多管采血顺序'],
    '顺序': ['多管采血顺序'],
    '淤青': ['采血后淤青怎么办'],
    '青了': ['采血后淤青怎么办'],
    '糖耐量': ['糖耐量流程'],
    'OGTT': ['糖耐量流程'],
    '糖水': ['喝糖水吐了怎么办'],
    '吐了': ['喝糖水吐了怎么办'],
    '痰': ['痰培养怎么留'],
    '唾液': ['怎么避免唾液混入'],
    '血培养': ['血培养采血量'],
    '激素': ['激素水平检测时间'],
    '药物': ['哪些药影响检测'],
    '药': ['哪些药影响检测'],
    '脑脊液': ['脑脊液怎么运送'],
    '厌氧': ['厌氧菌标本注意']
  };
  for(var word in keywords){
    if(lowerT.indexOf(word)>=0){
      return qa[keywords[word][0]];
    }
  }
  return qa[' default'];
}

function addMsg(txt,typ){
  var box=document.getElementById('msgs');
  var wel=document.getElementById('wel');
  if(wel)wel.parentNode.removeChild(wel);
  var d=document.createElement('div');
  d.className='bub '+typ;
  if(typ==='a')d.innerHTML='<div class="name">🤖 智检助手</div>'+txt;
  else d.textContent=txt;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}

function showType(cb){
  var box=document.getElementById('msgs');
  var d=document.createElement('div');
  d.className='bub a';
  d.id='typing';
  d.innerHTML='<div class="name">🤖 智检助手</div><div class="type"><span></span><span></span><span></span></div>';
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
  setTimeout(function(){d.parentNode.removeChild(d);cb()},1200);
}

window.addEventListener('load',function(){
  setTimeout(function(){
    var box=document.getElementById('msgs');
    var wel=document.getElementById('wel');
    if(wel)wel.parentNode.removeChild(wel);
    var d=document.createElement('div');
    d.className='bub a';
    d.innerHTML='<div class="name">🤖 智检助手</div>系统已就绪！请先选择标本类型，再拍照上传。';
    box.appendChild(d);
    box.scrollTop=box.scrollHeight;
  },500);
});
</script>

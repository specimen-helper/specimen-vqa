<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>标本留取智能助手 V2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:#f5f7fa;color:#1e293b;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#f5f7fa}

/* 头部 */
.header{background:linear-gradient(135deg,#667eea,#764ba2);padding:12px 16px;text-align:center;position:relative}
.header h1{color:#fff;font-size:17px;font-weight:700}
.header p{color:rgba(255,255,255,.8);font-size:11px;margin-top:2px}
.header .tag{position:absolute;top:8px;right:10px;background:rgba(255,255,255,.2);color:#fff;font-size:9px;padding:2px 8px;border-radius:20px}

/* 内容 */
.main{padding:10px 12px 30px}
.tip{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#92400e}

/* 拍照 */
.cam{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.frame{width:100%;aspect-ratio:16/9;background:#fafbfc;border:2px dashed #d1d5db;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
.frame.on{background:#f0fdff;border-color:#06b6d4}
.frame .ico{font-size:40px;margin-bottom:4px}
.frame .txt{font-size:15px;font-weight:600;color:#1e293b}
.frame .sub{font-size:12px;color:#64748b;margin-top:2px}
.scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#06b6d4,transparent);box-shadow:0 0 10px #06b6d4;animation:scan 1.8s linear infinite;display:none}
.frame.on .scan{display:block}
@keyframes scan{0%{top:5%;opacity:0}15%{opacity:1}85%{opacity:1}100%{top:95%;opacity:0}}

/* 结果 */
.res{margin-top:10px;padding:10px 12px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:10px;border:1px solid #a7f3d0;display:none}
.res.bad{background:linear-gradient(135deg,#fef2f2,#fecaca);border-color:#fca5a5}
.res.show{display:block}
.res .head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.res .badge{background:#10b981;color:#fff;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.res.bad .badge{background:#ef4444}
.res .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(167,243,208,.4);font-size:12px}
.res.bad .row{border-bottom-color:rgba(252,165,165,.4)}
.res .row:last-child{border:none}
.res .lab{color:#64748b}
.res .val{font-weight:600}
.res.bad .val{color:#ef4444}
.res .ai{margin-top:8px;padding:8px 10px;background:#fff;border-radius:8px;font-size:12px;line-height:1.6}
.res .ai strong{color:#4f46e5}
.res.bad .ai strong{color:#ef4444}

/* 推荐 */
.pre{background:#fff;border-radius:12px;padding:10px 12px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.04);display:none}
.pre.show{display:block}
.pre .tit{font-size:12px;font-weight:600;margin-bottom:8px}
.pre .tit::before{content:'🔮 '}
.pre .tags{display:flex;flex-wrap:wrap;gap:6px}
.pre .tag{padding:6px 12px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);border:1px solid #c7d2fe;border-radius:16px;font-size:12px;color:#4f46e5;cursor:pointer;font-family:inherit}

/* 聊天 */
.chat{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04);margin-bottom:10px}
.chat .bar{background:linear-gradient(135deg,#667eea,#764ba2);padding:10px 14px;display:flex;align-items:center;gap:8px}
.chat .bar .av{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px}
.chat .bar .tit{color:#fff;font-size:15px;font-weight:600}
.chat .body{padding:10px 12px}

/* 消息区 - 关键：固定高度+深色边框确保可见 */
.msgs{height:180px;overflow-y:auto;margin-bottom:10px;border:2px solid #94a3b8;border-radius:10px;background:#f1f5f9;padding:8px}
.msgs .welcome{text-align:center;padding:20px 10px;color:#64748b;font-size:13px;line-height:1.8}
.bub{max-width:88%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;margin-bottom:10px;word-break:break-word}
.bub.u{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.bub.a{background:#fff;color:#1e293b;border:1px solid #cbd5e1;border-bottom-left-radius:4px}
.bub.a .name{font-size:11px;color:#6366f1;font-weight:700;margin-bottom:3px}

/* 快捷标签 */
.qwrap{overflow-x:auto;margin-bottom:8px}
.qwrap::-webkit-scrollbar{display:none}
.qlist{display:flex;gap:8px;white-space:nowrap;padding:2px}
.qtag{padding:7px 14px;background:#eff6ff;border:1px solid #dbeafe;border-radius:20px;font-size:12px;color:#4f46e5;cursor:pointer;font-family:inherit}

/* 输入 */
.inwrap{display:flex;gap:8px;padding-top:8px;border-top:1px solid #e2e8f0}
.inwrap input{flex:1;padding:10px 14px;border:1px solid #e2e8f0;border-radius:20px;font-size:14px;outline:none;background:#f5f7fa}
.inwrap button{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}

/* 底部 */
.foot{text-align:center;padding:8px;font-size:10px;color:#64748b}
.foot .bad{display:inline-block;background:linear-gradient(135deg,#dbeafe,#e9d5ff);color:#4f46e5;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;margin-bottom:3px}

/* 打字 */
.type{display:flex;gap:3px;padding:8px 12px}
.type span{width:7px;height:7px;background:#818cf8;border-radius:50%;animation:b 1.4s infinite}
.type span:nth-child(2){animation-delay:.2s}
.type span:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="tag">V 2.0</span>
    <div style="font-size:22px;margin-bottom:2px">🧪</div>
    <h1>标本留取智能助手</h1>

      </div>

    <div class="pre" id="pre">
      <div class="tit">根据识别结果，您可能想问</div>
      <div class="tags" id="ptags"></div>
    </div>

    <div class="chat">

        </div>
        <div class="qwrap">
          <div class="qlist" id="qlist">
            <button class="qtag" data-q="空腹能喝水吗？">空腹能喝水吗</button>
            <button class="qtag" data-q="尿液怎么留？">尿液怎么留</button>
            <button class="qtag" data-q="粪便留多少？">粪便留多少</button>
            <button class="qtag" data-q="月经能留尿吗？">月经能留尿吗</button>
            <button class="qtag" data-q="采血后淤青怎么办？">采血后淤青</button>
            <button class="qtag" data-q="抗凝管怎么选？">抗凝管怎么选</button>
            <button class="qtag" data-q="糖耐量流程？">糖耐量流程</button>
            <button class="qtag" data-q="24小时尿怎么留？">24小时尿</button>
          </div>
        </div>
        <div class="inwrap">
          <input type="text" id="inp" placeholder="请输入您的问题...">
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>

    <div class="foot">
      <div class="bad">📊 基于528例RCT临床验证 · 识别准确率91.3% · 平均响应0.6秒</div>
      <div>不合格率降低77% · 宣教时间缩短73% · 患者满意度95.6分</div>
    </div>
  </div>
</div>

  '空腹能喝水吗':'可以少量饮用白开水（不超过200ml），但不能喝饮料、茶、咖啡、牛奶等。大量饮水会稀释血液，影响检测结果。',

var idx=0;

// ===== 拍照扫描 =====
function doScan(){
  var f=document.getElementById('frame');
  var r=document.getElementById('res');
  var p=document.getElementById('pre');
  f.classList.add('on');
  r.classList.remove('show');
  r.classList.remove('bad');
  p.classList.remove('show');
  setTimeout(function(){
    f.classList.remove('on');
    var s=scenes[idx];
    var rb=document.getElementById('rbadge');
    var rs=document.getElementById('rscore');
    var rv=document.getElementById('rvol');
    var ra=document.getElementById('rai');
    if(!s.ok){
      r.classList.add('bad');
      rb.classList.add('bad');
      rb.textContent='✗ 识别异常';
      rs.style.color='#ef4444';
      rv.style.color='#ef4444';
      ra.classList.add('bad');
    }else{
      rb.classList.remove('bad');
      rb.textContent='✓ 识别成功';
      rs.style.color='#10b981';
      rv.style.color='#1e293b';
      ra.classList.remove('bad');
    }
    document.getElementById('rtype').textContent=s.type;
    document.getElementById('rbox').textContent=s.box;
    document.getElementById('rvol').textContent=s.vol;
    document.getElementById('rstatus').textContent=s.status;
    document.getElementById('rscore').textContent=s.score;
    document.getElementById('rai').innerHTML=s.tip;
    r.classList.add('show');
    var pt=document.getElementById('ptags');
    pt.innerHTML='';
    for(var i=0;i<s.pre.length;i++){
      var b=document.createElement('button');
      b.className='tag';
      b.textContent=s.pre[i];
      b.setAttribute('data-q',s.pre[i]);
      b.onclick=function(){sendQ(this.getAttribute('data-q'))};
      pt.appendChild(b);
    }
    p.classList.add('show');
    idx=(idx+1)%scenes.length;
  },2000);
}

// ===== 绑定事件（DOM加载后） =====
document.getElementById('frame').onclick=doScan;

var qtags=document.querySelectorAll('#qlist .qtag');
for(var i=0;i<qtags.length;i++){
  qtags[i].onclick=function(){sendQ(this.getAttribute('data-q'))};
}

document.getElementById('sendBtn').onclick=doSend;
document.getElementById('inp').onkeypress=function(e){if(e.key==='Enter')doSend()};

// ===== 发送消息 =====
function sendQ(q){
  addMsg(q,'u');
  showType(function(){addMsg(findA(q),'a')});
}

function doSend(){
  var inp=document.getElementById('inp');
  var t=inp.value.trim();
  if(!t)return;
  addMsg(t,'u');
  inp.value='';
  showType(function(){addMsg(findA(t),'a')});
}

function findA(t){
  for(var k in qa){
    if(k===' default')continue;
    if(t.indexOf(k)>=0||k.indexOf(t)>=0)return qa[k];
  }
  return qa[' default'];
}

function addMsg(txt,typ){
  var box=document.getElementById('msgs');
  var wel=document.getElementById('wel');
  if(wel)wel.parentNode.removeChild(wel);
  var d=document.createElement('div');
  d.className='bub '+typ;
  if(typ==='a')d.innerHTML='<div class="name">🤖 智检助手</div>'+txt;
  else d.textContent=txt;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}

function showType(cb){
  var box=document.getElementById('msgs');
  var d=document.createElement('div');
  d.className='bub a';
  d.id='typing';
  d.innerHTML='<div class="name">🤖 智检助手</div><div class="type"><span></span><span></span><span></span></div>';
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
  setTimeout(function(){d.parentNode.removeChild(d);cb()},1200);
}

// ===== 自检：页面加载后显示系统就绪 =====
window.onload=function(){
  setTimeout(function(){
    var box=document.getElementById('msgs');
    var wel=document.getElementById('wel');
    if(wel)wel.parentNode.removeChild(wel);
    var d=document.createElement('div');
    d.className='bub a';
    d.innerHTML='<div class="name">🤖 智检助手</div>系统已就绪！您可以点击下方快捷问题，或输入您的问题。';
    box.appendChild(d);
    box.scrollTop=box.scrollHeight;
  },500);
};

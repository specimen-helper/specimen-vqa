<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>标本留取智能助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:#f5f7fa;color:#1e293b;min-height:100vh;touch-action:manipulation}
.app{max-width:480px;margin:0 auto;background:#f5f7fa}

.header{background:linear-gradient(135deg,#667eea,#764ba2);padding:6px 10px;text-align:center;position:relative}
.header h1{color:#fff;font-size:15px;font-weight:700;line-height:1.3}
.header p{color:rgba(255,255,255,.8);font-size:10px;margin-top:1px}
.header .tag{position:absolute;top:4px;right:8px;background:rgba(255,255,255,.2);color:#fff;font-size:9px;padding:1px 6px;border-radius:20px}

.main{padding:5px 8px 6px}
.tip{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:6px;padding:4px 8px;margin-bottom:4px;font-size:11px;color:#92400e}

.ai-status{display:flex;align-items:center;gap:4px;padding:3px 8px;margin-bottom:4px;font-size:10px;border-radius:4px}
.ai-status.ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.ai-status.warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.ai-status.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.ai-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.cam{background:#fff;border-radius:10px;padding:6px;margin-bottom:5px;box-shadow:0 1px 4px rgba(0,0,0,.04)}

.typebar{margin-bottom:4px}
.typebar .tt{font-size:11px;font-weight:700;color:#374151;margin-bottom:4px}
.typebar .tt::before{content:'🧫 '}
.typelist{display:flex;flex-wrap:wrap;gap:5px}
.typebtn{padding:4px 8px;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:14px;font-size:11px;color:#475569;cursor:pointer;font-family:inherit;-webkit-appearance:none;transition:all .2s;touch-action:manipulation}
.typebtn:active{transform:scale(.95)}
.typebtn.on{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(102,126,234,.3)}
.typebtn .check{display:none;margin-right:3px}
.typebtn.on .check{display:inline}

.frame-wrap{position:relative;width:100%;aspect-ratio:2/1;min-height:100px;cursor:pointer;-webkit-user-select:none;user-select:none}
.frame{width:100%;height:100%;background:#f8fafc;border:2px dashed #d1d5db;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:all .3s}
.frame.on{background:#f0fdff;border-color:#06b6d4;border-style:solid}
.frame .ico{font-size:24px;margin-bottom:2px;pointer-events:none}
.frame .txt{font-size:13px;font-weight:600;color:#1e293b;pointer-events:none}
.frame .sub{font-size:10px;color:#64748b;margin-top:1px;pointer-events:none}
.frame .preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:1;pointer-events:none}
.scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#06b6d4,transparent);box-shadow:0 0 8px #06b6d4;animation:scan 2s linear infinite;display:none;z-index:3}
.frame.on .scan{display:block}
@keyframes scan{0%{top:5%;opacity:0}15%{opacity:1}85%{opacity:1}100%{top:95%;opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.fileInput{position:absolute;inset:0;width:100%;height:100%;opacity:0;z-index:10;pointer-events:none}

.res{margin-top:5px;padding:5px 8px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:8px;border:1px solid #a7f3d0;display:none}
.res.bad{background:linear-gradient(135deg,#fef2f2,#fecaca);border-color:#fca5a5}
.res.show{display:block}
.res .head{display:flex;align-items:center;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.res .badge{background:#10b981;color:#fff;padding:1px 6px;border-radius:14px;font-size:9px;font-weight:600}
.res.bad .badge{background:#ef4444}
.res .row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(167,243,208,.4);font-size:11px}
.res.bad .row{border-bottom-color:rgba(252,165,165,.4)}
.res .row:last-child{border:none}
.res .lab{color:#64748b}
.res .val{font-weight:600}
.res.bad .val{color:#ef4444}
.res .ai{margin-top:4px;padding:4px 6px;background:#fff;border-radius:6px;font-size:11px;line-height:1.5}
.res .ai strong{color:#4f46e5}
.res.bad .ai strong{color:#ef4444}
.res .fixbar{margin-top:5px;display:flex;gap:4px;flex-wrap:wrap}
.res .fixbar .fixbtn{padding:3px 7px;background:#f1f5f9;border:1px solid #cbd5e1;border-radius:10px;font-size:10px;color:#475569;cursor:pointer}
.res .fixbar .fixbtn:active{background:#e2e8f0}

.pre{background:#fff;border-radius:12px;padding:8px 10px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04);display:none}
.pre.show{display:block}
.pre .tit{font-size:12px;font-weight:700;margin-bottom:6px}
.pre .tit::before{content:'🔮 '}
.pre .tags{display:flex;flex-wrap:wrap;gap:6px}
.pre .tag{padding:5px 10px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);border:1px solid #c7d2fe;border-radius:14px;font-size:11px;color:#4f46e5;cursor:pointer;font-family:inherit;-webkit-appearance:none;border:none}
.pre .tag:active{transform:scale(.95)}

.chat{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:4px}
.chat .bar{background:linear-gradient(135deg,#667eea,#764ba2);padding:5px 8px;display:flex;align-items:center;gap:6px}
.chat .bar .av{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:11px}
.chat .bar .tit{color:#fff;font-size:13px;font-weight:600}
.chat .body{padding:5px 8px}

.msgs{height:180px;overflow-y:auto;margin-bottom:5px;border:1.5px solid #cbd5e1;border-radius:8px;background:#f8fafc;padding:6px}
.msgs .welcome{text-align:center;padding:12px 4px;color:#64748b;font-size:11px;line-height:1.5}
.bub{max-width:90%;padding:6px 10px;border-radius:10px;font-size:12px;line-height:1.5;margin-bottom:5px;word-break:break-word}
.bub.u{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.bub.a{background:#fff;color:#1e293b;border:1px solid #cbd5e1;border-bottom-left-radius:4px}
.bub.a .name{font-size:11px;color:#6366f1;font-weight:700;margin-bottom:2px}
.bub.err{background:#fef2f2;border-color:#fecaca;color:#991b1b}

.qwrap{overflow-x:auto;margin-bottom:4px}
.qwrap::-webkit-scrollbar{display:none}
.qlist{display:flex;gap:5px;white-space:nowrap;padding:1px}
.qtag{padding:3px 7px;background:#eff6ff;border:1px solid #dbeafe;border-radius:16px;font-size:10px;color:#4f46e5;cursor:pointer;font-family:inherit;-webkit-appearance:none;border:none}
.qtag:active{transform:scale(.95)}

.inwrap{display:flex;gap:6px;padding-top:4px;border-top:1px solid #e2e8f0}
.inwrap input{flex:1;padding:5px 10px;border:1.5px solid #e2e8f0;border-radius:16px;font-size:12px;outline:none;background:#f5f7fa;-webkit-appearance:none}
.inwrap input:focus{border-color:#6366f1;background:#fff}
.inwrap button{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;-webkit-appearance:none}
.inwrap button:active{transform:scale(.92)}

.foot{text-align:center;padding:3px;font-size:9px;color:#64748b;line-height:1.4}
.foot .bad{display:inline-block;background:linear-gradient(135deg,#dbeafe,#e9d5ff);color:#4f46e5;padding:1px 6px;border-radius:14px;font-size:9px;font-weight:600}

.rebtn{margin-top:4px;text-align:center;display:none}
.rebtn.show{display:block}
.rebtn button{padding:3px 10px;background:#f1f5f9;border:1.5px solid #cbd5e1;border-radius:14px;font-size:11px;color:#475569;cursor:pointer;font-family:inherit}
.rebtn button:active{background:#e2e8f0}

.hint{margin-top:4px;padding:3px 6px;background:#fef2f2;border:1px solid #fecaca;border-radius:4px;font-size:10px;color:#991b1b;display:none}
.hint.show{display:block}

.statusbar{margin-top:4px;padding:3px 6px;background:#eff6ff;border:1px solid #dbeafe;border-radius:4px;font-size:10px;color:#1e40af;display:none}
.statusbar.show{display:block}

.type{display:flex;gap:3px;padding:6px 8px}
.type span{width:6px;height:6px;background:#818cf8;border-radius:50%;animation:b 1.4s infinite}
.type span:nth-child(2){animation-delay:.2s}
.type span:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
</style>
<base target="_blank">
</head>
<body>
<div class="app">
  <div class="header">
    <span class="tag">V2.0</span>
    <div style="font-size:16px;margin-bottom:1px">🧪</div>
    <h1>标本留取智能助手</h1>
    <p>拍照识别 · 智能质控 · 即时指导</p>
  </div>
  <div class="main">
    <div class="tip">💡 选择标本类型后拍照，自动识别并评估质量</div>

    <!-- AI服务状态（仅异常时显示） -->
    <div class="ai-status warn" id="aiStatus" style="display:none">
      <span class="dot"></span>
      <span id="aiStatusText">正在初始化AI服务...</span>
    </div>

    <div class="cam">
      <div class="typebar">
        <div class="tt">请选择标本类型</div>
        <div class="typelist" id="typelist">
          <button class="typebtn" data-idx="0"><span class="check">✓</span>尿液</button>
          <button class="typebtn" data-idx="1"><span class="check">✓</span>粪便</button>
          <button class="typebtn" data-idx="2"><span class="check">✓</span>血液</button>
          <button class="typebtn" data-idx="3"><span class="check">✓</span>痰液</button>
          <button class="typebtn" data-idx="4"><span class="check">✓</span>血培养</button>
          <button class="typebtn" data-idx="5"><span class="check">✓</span>糖耐量</button>
        </div>
      </div>

      <div class="frame-wrap" id="frameWrap">
        <div class="frame" id="frame">
          <div class="scan"></div>
          <img class="preview" id="preview" alt="preview">
          <div class="ico" id="fico">📷</div>
          <div class="txt" id="ftxt">请先选择上方标本类型</div>
          <div class="sub" id="fsub">选择后点击拍照</div>
        </div>
        <input type="file" class="fileInput" id="fileInput" accept="image/*" capture="environment">
      </div>

      <div class="hint" id="hint">⚠️ 请先选择标本类型，再进行拍照</div>
      <div class="statusbar" id="statusbar">正在分析中，请稍候...</div>

      <div class="rebtn" id="rebtn">
        <button onclick="resetPhoto()">🔄 重新拍照</button>
      </div>

      <!-- 错误提示 -->
      <div class="res bad" id="errRes" style="display:none;margin-top:8px;">
        <div class="head"><span class="badge" style="background:#ef4444">✗ AI服务异常</span></div>
        <div class="ai" id="errMsg"></div>
        <div class="fixbar" style="margin-top:8px;">
          <button class="fixbtn" onclick="retryAnalyze()">🔄 重新识别</button>
        </div>
      </div>

      <!-- 识别结果 -->
      <div class="res" id="res">
        <div class="head">
          <span class="badge" id="rbadge">✓ 识别成功</span>
          <span id="rscore" style="font-size:11px;color:#10b981;font-weight:600">置信度 高</span>
          <span id="rmode" style="font-size:10px;color:#94a3b8;margin-left:auto">[智能识别]</span>
        </div>
        <div class="row"><span class="lab">标本类型</span><span class="val" id="rtype">—</span></div>
        <div class="row"><span class="lab">容器类型</span><span class="val" id="rbox">—</span></div>
        <div class="row"><span class="lab">管帽颜色</span><span class="val" id="rcolor">—</span></div>
        <div class="row"><span class="lab">留取量评估</span><span class="val" id="rvol">—</span></div>
        <div class="row"><span class="lab">状态评估</span><span class="val" id="rstatus">—</span></div>
        <div class="ai" id="rai"></div>
        <div class="fixbar">
          <span style="font-size:10px;color:#94a3b8">识别有误？人工纠正：</span>
          <button class="fixbtn" onclick="fixColor('紫')">🟣紫</button>
          <button class="fixbtn" onclick="fixColor('蓝')">🔵蓝</button>
          <button class="fixbtn" onclick="fixColor('绿')">🟢绿</button>
          <button class="fixbtn" onclick="fixColor('灰')">⚪灰</button>
          <button class="fixbtn" onclick="fixColor('黄')">🟡黄</button>
          <button class="fixbtn" onclick="retryAnalyze()">🔄重识</button>
        </div>
      </div>
    </div>

    <div class="chat">
      <div class="bar"><div class="av">💬</div><div class="tit">标本助手 · 智能问答</div></div>
      <div class="body">
        <div class="msgs" id="msgs">
          <div class="welcome" id="wel">您好！我是标本采集辅助助手<br>支持拍照自查 + 知识问答<br>点击下方问题或输入您的问题</div>
        </div>
        <div class="qwrap">
          <div class="qlist" id="qlist">
            <button class="qtag" data-q="空腹能喝水吗？">空腹能喝水吗</button>
            <button class="qtag" data-q="尿液怎么留？">尿液怎么留</button>
            <button class="qtag" data-q="粪便留多少？">粪便留多少</button>
            <button class="qtag" data-q="月经能留尿吗？">月经能留尿吗</button>
            <button class="qtag" data-q="采血后淤青怎么办？">采血后淤青</button>
            <button class="qtag" data-q="抗凝管怎么选？">抗凝管怎么选</button>
            <button class="qtag" data-q="糖耐量流程？">糖耐量流程</button>
            <button class="qtag" data-q="24小时尿怎么留？">24小时尿</button>
          </div>
        </div>
        <div class="inwrap">
          <input type="text" id="inp" placeholder="请输入问题...">
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>

    <div class="foot">
      <div class="bad">多模态AI视觉问答 · 标本质控系统 V2.0</div>
    </div>
  </div>
</div>

<script>
// ==================== 配置：直接调用阿里云百炼API ====================
// ⚠️ 演示用途：Key暴露于前端，演示结束后请立即在百炼控制台禁用此Key
var DASHSCOPE_KEY = 'sk-e995de53d46f42c495a830085b08d831';
var API_URL = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';

// ==================== 优化Prompt：强制结构化JSON输出 ====================
var SYSTEM_PROMPT = "你是一位资深医学检验标本质量评估专家。请对图片中的医疗标本进行严格视觉评估。\n\n## 识别重点（按优先级排序）\n1. **采血管颜色识别**（最关键）：紫色=EDTA-K2(血常规)；蓝色=枸橼酸钠(凝血)；绿色=肝素(血流变)；灰色=氟化钠(血糖)；黄色/金色=促凝剂/分离胶(生化免疫)\n2. **容器类型**：无菌尿杯、粪便采集盒、无菌痰盒、血培养瓶等\n3. **留取量**：通过刻度线/液面高度判断，给出具体估计值\n4. **质量状态**：容器完好性、密封性、有无污染/溶血/凝血\n\n## 输出格式（必须返回JSON，不要markdown代码块）\n{\"specimenType\":\"标本类型\",\"containerType\":\"容器类型\",\"containerColor\":\"管帽颜色(紫/蓝/绿/灰/黄/无)\",\"volume\":\"留取量描述\",\"isQualified\":true/false,\"status\":\"状态评估\",\"confidence\":\"高/中/低\",\"suggestion\":\"指导建议200字内\",\"reason\":\"不合格原因\"}\n\n## 判断标准\n- 尿液≥8ml合格；粪便5-10g合格；血液按管型达刻度线；痰液≥3ml；血培养成人8-10ml/瓶；糖耐量需5个时间点\n- 非标本照片（空白/风景/自拍）：isQualified=false, reason=\"未检测到有效标本\"\n- 颜色无法确定：confidence=\"低\"，containerColor=\"无法确定\"";

// ==================== 状态 ====================
var selectedType = '';
var isScanning = false;
var lastImageB64 = '';
var lastResult = null;

var typeMap = {
  '0': {name:'尿液标本', pre:['中段尿怎么留？','24小时尿怎么留？','月经期能验尿吗？','尿常规要多少尿？']},
  '1': {name:'粪便标本', pre:['一平勺是多少？','潜血检查要注意什么？','大便培养怎么留？','送检时效多久？']},
  '2': {name:'血液标本', pre:['紫头管查什么？','蓝头管查什么？','绿头管查什么？','多管采血顺序？']},
  '3': {name:'痰液标本', pre:['怎么避免唾液混入？','结核菌检查要求？','儿童怎么留痰？','痰培养怎么留？']},
  '4': {name:'血培养标本', pre:['血培养采血量？','什么时候采血最好？','脑脊液怎么运送？','厌氧菌标本注意？']},
  '5': {name:'糖耐量试验（OGTT）', pre:['OGTT前能吃东西吗？','喝糖水吐了怎么办？','激素水平检测时间？','哪些药影响检测？']}
};

var colorContainerMap = {
  '紫': '紫头管（EDTA-K₂抗凝）→ 血常规、血型、交叉配血',
  '蓝': '蓝头管（枸橼酸钠抗凝）→ 凝血功能(PT/APTT/INR)',
  '绿': '绿头管（肝素抗凝）→ 血流变、部分生化',
  '灰': '灰头管（氟化钠抗凝）→ 血糖检测',
  '黄': '黄头管（促凝剂/分离胶）→ 生化、免疫、肿瘤标志物'
};

// ==================== DOM元素 ====================
var frameWrap = document.getElementById('frameWrap');
var frame = document.getElementById('frame');
var fileInput = document.getElementById('fileInput');
var preview = document.getElementById('preview');
var fico = document.getElementById('fico');
var ftxt = document.getElementById('ftxt');
var fsub = document.getElementById('fsub');
var rebtn = document.getElementById('rebtn');
var hint = document.getElementById('hint');
var statusbar = document.getElementById('statusbar');
var resEl = document.getElementById('res');
var errResEl = document.getElementById('errRes');
var aiStatus = document.getElementById('aiStatus');
var aiStatusText = document.getElementById('aiStatusText');

// ==================== 初始化：仅异常时显示AI状态 ====================
function testAPI(){
  fetch(API_URL, {
    method: 'POST',
    headers: {'Authorization': 'Bearer ' + DASHSCOPE_KEY, 'Content-Type': 'application/json'},
    body: JSON.stringify({model:'qwen-vl-plus', messages:[{role:'user',content:[{type:'text',text:'hi'}]}], max_tokens:5})
  }).then(function(r){
    if(r.status === 200 || r.status === 400){
      // API正常，隐藏状态条
      aiStatus.style.display = 'none';
      aiStatusText.textContent = '';
    } else {
      throw new Error('HTTP ' + r.status);
    }
  }).catch(function(e){
    // 仅异常时显示警告
    aiStatus.style.display = 'flex';
    aiStatus.className = 'ai-status err';
    aiStatusText.textContent = '✗ 拍照服务异常，可能余额不足或网络故障';
  });
}
setTimeout(testAPI, 500);

// ==================== 类型选择 ====================
var typebtns = document.querySelectorAll('.typebtn');
for(var i=0;i<typebtns.length;i++){
  typebtns[i].addEventListener('click', function(){
    for(var j=0;j<typebtns.length;j++) typebtns[j].classList.remove('on');
    this.classList.add('on');
    selectedType = this.getAttribute('data-idx');
    ftxt.textContent = '已选择：' + typeMap[selectedType].name;
    fsub.textContent = '点击此处拍照或选图';
    hint.classList.remove('show');
    // 选择类型后，底部推荐自动切换为该类型相关问题
    renderBottomQ(typeMap[selectedType].name, null);
  });
}

// ==================== 拍照点击代理 ====================

// ==================== AI扫描：直调百炼VL ====================
function doScan(){
  if(isScanning || !lastImageB64) return;
  isScanning = true;
  frame.classList.add('on');
  resEl.classList.remove('show','bad');
  errResEl.style.display = 'none';
  rebtn.classList.remove('show');
  statusbar.classList.add('show');
  ftxt.textContent = '正在分析中...';
  fsub.textContent = '正在调用视觉识别引擎';

  var userPrompt = SYSTEM_PROMPT;
  if(selectedType){
    userPrompt += '\n\n【参考】用户声明标本类型：' + typeMap[selectedType].name + '。请以你的视觉判断为准。';
  }

  var payload = {
    model: 'qwen-vl-plus',
    messages: [{
      role: 'user',
      content: [
        {type: 'text', text: userPrompt},
        {type: 'image_url', image_url: {url: 'data:image/jpeg;base64,' + lastImageB64}}
      ]
    }],
    max_tokens: 800,
    temperature: 0.3
  };

  fetch(API_URL, {
    method: 'POST',
    headers: {'Authorization': 'Bearer ' + DASHSCOPE_KEY, 'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    frame.classList.remove('on');
    statusbar.classList.remove('show');
    if(data.error){
      showError('百炼API错误：' + (data.error.message || JSON.stringify(data.error)));
      isScanning = false; return;
    }
    var content = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    if(!content){ showError('API未返回有效识别结果'); isScanning = false; return; }

    // 提取JSON
    var jsonMatch = content.match(/\{[\s\S]*\}/);
    if(!jsonMatch){ showError('AI返回格式异常，未包含JSON。原始输出：' + content.substring(0,200)); isScanning = false; return; }

    try{
      var parsed = JSON.parse(jsonMatch[0]);
      showResult({
        type: parsed.specimenType || '—',
        container: parsed.containerType || '—',
        containerColor: parsed.containerColor || '—',
        volume: parsed.volume || '—',
        qualified: parsed.isQualified !== false,
        status: parsed.status || '—',
        confidence: parsed.confidence || '中',
        suggestion: parsed.suggestion || '',
        reason: parsed.reason || ''
      });
    }catch(e){
      showError('JSON解析失败：' + e.message + '。原始输出：' + content.substring(0,300));
    }
    isScanning = false;
  })
  .catch(function(err){
    frame.classList.remove('on');
    statusbar.classList.remove('show');
    showError('网络错误：' + (err.message || '无法连接到视觉识别服务'));
    isScanning = false;
  });
}

function retryAnalyze(){ errResEl.style.display = 'none'; doScan(); }

function showResult(data){
  lastResult = data;
  var isBad = data.qualified === false;
  document.getElementById('rbadge').textContent = isBad ? '✗ 标本不合格' : '✓ 识别成功';
  document.getElementById('rscore').textContent = '置信度 ' + data.confidence;
  document.getElementById('rscore').style.color = isBad ? '#ef4444' : '#10b981';

  var colorMap = {'紫':'🟣','蓝':'🔵','绿':'🟢','灰':'⚪','黄':'🟡'};
  var cd = colorMap[data.containerColor] || '';
  document.getElementById('rtype').textContent = data.type;
  document.getElementById('rbox').textContent = data.container;
  document.getElementById('rcolor').textContent = (cd ? cd + ' ' : '') + data.containerColor;
  document.getElementById('rvol').textContent = data.volume;
  document.getElementById('rstatus').textContent = data.status;

  // 合格时不显示原因，只显示建议；不合格时显示原因+建议
  var suggestion = data.suggestion;
  if(isBad && data.reason){
    suggestion = '<strong style="color:#ef4444">⚠️ 不合格原因：</strong>' + data.reason + '<br><br>' + suggestion;
  }
  document.getElementById('rai').innerHTML = suggestion;

  resEl.classList.toggle('bad', isBad);
  resEl.classList.add('show');
  errResEl.style.display = 'none';

  // 底部问答区根据识别结果动态更新推荐
  renderBottomQ(data.type, data.containerColor);
  rebtn.classList.add('show');
}

function showError(msg){
  errResEl.style.display = 'block';
  document.getElementById('errMsg').innerHTML = msg + '<br><br>建议：检查网络连接后点击"重新识别"，或刷新页面重试。';
  resEl.classList.remove('show');
  rebtn.classList.add('show');
}

function fixColor(color){
  if(!lastResult) return;
  lastResult.containerColor = color;
  lastResult.container = colorContainerMap[color] || lastResult.container;
  showResult(lastResult);
  addMsg('用户纠正：管帽颜色应为' + color + '色', 'u');
  showType(function(){ addMsg('已按' + color + '色重新评估。此纠正将用于优化模型。', 'a'); });
}

var keywordMap = {
  '空腹': '空腹能喝水吗', '喝水': '空腹能喝水吗', '多久': '空腹多久', '几小时': '空腹几小时',
  '尿': '尿液怎么留', '中段尿': '中段尿怎么留', '24小时尿': '24小时尿怎么留',
  '月经': '月经能留尿吗', '粪便': '粪便留多少', '大便': '大便怎么留', '留多少': '粪便留多少',
  '一平勺': '一平勺是多少', '潜血': '潜血检查要注意什么',
  '抗凝管': '抗凝管怎么选', '采血管': '抗凝管怎么选', '多管': '多管采血顺序', '顺序': '多管采血顺序',
  '淤青': '采血后淤青怎么办', '青了': '抽血后胳膊青了',
  '糖耐量': '糖耐量流程', 'OGTT': '糖耐量流程', '糖水': '喝糖水吐了怎么办',
  '痰': '痰培养怎么留', '唾液': '怎么避免唾液混入',
  '血培养': '血培养采血量', '激素': '激素水平检测时间', '药物': '哪些药影响检测', '药': '哪些药影响检测',
  '脑脊液': '脑脊液怎么运送', '厌氧': '厌氧菌标本注意',
  '紫头管': '紫头管查什么', '蓝头管': '蓝头管查什么', '绿头管': '绿头管查什么',
  '灰头管': '灰头管查什么', '黄头管': '黄头管查什么'
};

// ==================== UI绑定 ====================
document.querySelectorAll('#qlist .qtag').forEach(function(btn){
  btn.addEventListener('click', function(){ sendQ(this.getAttribute('data-q')); });
});
document.getElementById('sendBtn').addEventListener('click', doSend);
document.getElementById('inp').addEventListener('keypress', function(e){ if(e.key==='Enter') doSend(); });

function sendQ(q){ addMsg(q,'u'); showType(function(){ addMsg(findA(q),'a'); }); }
function doSend(){
  var inp = document.getElementById('inp');
  var t = inp.value.trim();
  if(!t) return;
  addMsg(t,'u'); inp.value = '';
  showType(function(){ addMsg(findA(t),'a'); });
}

function findA(t){
  // ========== 上下文感知：基于上次图像识别结果的追问 ==========
  if(lastResult){
    var ctxPattern = /不够|不足|少了|少|怎么办|为什么|达不到|原因|合格|不合格|够吗|行吗|可以|问题|影响|结果/;
    if(ctxPattern.test(t)){
      var type = lastResult.type || '';
      var volume = lastResult.volume || '';
      var qualified = lastResult.qualified;
      var reason = lastResult.reason || '';
      var checkText = (volume + reason + type).toLowerCase();
      
      // 通用询问"够吗"类问题
      if(/够吗|够不够|可以吗|行吗|这样行/.test(t)){
        if(qualified === true){
          return '【基于图像识别结果】根据刚才对您'+type+'照片的视觉评估，当前留取量是足够的（系统判断：'+volume+'）。您可以放心送检。如果仍有疑虑，可以请现场护士帮忙确认一下。';
        } else {
          return '【基于图像识别结果】根据刚才对您'+type+'照片的视觉评估，当前留取量<strong style="color:#ef4444">可能不足</strong>（系统判断：'+volume+'）。不合格原因：'+reason+'。建议您按下方指导重新留取，或请护士协助确认。';
        }
      }
      
      // 尿液标本
      if(/尿/.test(type)){
        if(qualified === false || /少|不足|不够|低|偏少/.test(checkText)){
          return '【基于图像识别结果】根据刚才对您尿液照片的视觉分析，您的留尿量偏少（系统评估：'+volume+'）。<br><br><strong>为什么量不够会有影响？</strong><br>尿常规检查通常需要至少8ml（约专用尿杯的1/3以上）。尿量不足可能导致：①尿比重无法准确测定；②尿蛋白、尿糖等化学项目浓度偏差；③部分检验项目无法复测核实。<br><br><strong>建议：</strong><br>①适量饮用白开水200-300ml，等待30分钟后再留取；②避免一次性大量饮水，防止尿液过度稀释；③排尿时先排出一部分，再收集中段尿；④如确实无法留够，请告知护士，可能需要导尿或调整检查方案。';
        } else {
          return '【基于图像识别结果】根据刚才对您尿液照片的分析，您的留尿量看起来是足够的（系统评估：'+volume+'）。如果仍有疑虑，可以请现场护士用刻度杯确认一下。';
        }
      }
      
      // 粪便标本
      if(/粪|便/.test(type)){
        if(qualified === false || /少|不足|不够|低|偏少/.test(checkText)){
          return '【基于图像识别结果】根据刚才对粪便照片的视觉评估，留取量不足（系统判断：'+volume+'）。<br><br><strong>为什么需要够量？</strong><br>常规粪便检查需要约拇指大小（5-10g，专用采集勺一平勺）。量不足可能导致：①镜检时观察区域太少，漏诊寄生虫卵或隐血；②细菌培养时接种量不够，培养失败；③需要重新留取，延误检查时间。<br><br><strong>建议：</strong><br>①排便时多取几个部位的样本，特别是有脓血、黏液的部分；②使用专用采集勺，确保取到一平勺（约拇指大小）；③如这次确实不够，可以下次排便时重新留取。';
        } else {
          return '【基于图像识别结果】根据对粪便照片的分析，留取量看起来足够（系统评估：'+volume+'）。请确保选取了脓血黏液部分，1小时内送检。';
        }
      }
      
      // 血液标本（排除血培养）
      if(/血/.test(type) && !/培养/.test(type)){
        if(qualified === false || /少|不足|不够|低|偏少|未达/.test(checkText)){
          return '【基于图像识别结果】根据对采血管照片的分析，当前采血量可能不足（系统评估：'+volume+'）。<br><br><strong>血量不足的影响：</strong><br>①紫头管（血常规）不足会导致抗凝剂比例失调，血细胞形态改变；②蓝头管（凝血）不足直接影响PT、APTT准确性，可能导致假性延长；③生化管不足可能导致血清量不够，无法完成全部项目。<br><br><strong>建议：</strong><br>采血时如出血慢，可握紧拳头再放松促进静脉充盈；护士会调整针头角度或更换采血管。请勿自行挤压采血部位，可能导致溶血影响结果。如血量确实不足，可能需要重新穿刺。';
        } else {
          return '【基于图像识别结果】根据对采血管照片的分析，采血量看起来达标（系统评估：'+volume+'）。采血后请记得将采血管轻轻颠倒混匀5-8次。';
        }
      }
      
      // 痰液标本
      if(/痰/.test(type)){
        if(qualified === false || /少|不足|不够|低|偏少/.test(checkText)){
          return '【基于图像识别结果】根据对痰液照片的分析，留取量偏少（系统评估：'+volume+'）。<br><br><strong>痰少的影响：</strong><br>痰液检查需要3-5ml，必须是深咳出的肺部痰液，不能混入唾液。量不足可能导致：①涂片过薄，镜检找不到结核菌或癌细胞；②培养时接种量不足，细菌生长失败；③检验人员可能拒收标本。<br><br><strong>建议：</strong><br>①晨起痰液较多，优先此时留取；②深吸气后用力深咳，从肺部深处咳出；③必要时可雾化吸入刺激排痰（医院操作）；④连续3天留取提高检出率。切勿用唾液代替！';
        } else {
          return '【基于图像识别结果】根据对痰液照片的分析，留取量看起来足够（系统评估：'+volume+'）。请确认是深咳出的肺部痰液，未混入唾液，盖紧盖子立即送检。';
        }
      }
      
      // 血培养标本
      if(/培养/.test(type) && /血/.test(type)){
        return '【基于图像识别结果】根据对血培养瓶照片的分析，采血量为：'+volume+'。<br><br><strong>血培养采血量标准：</strong>成人8-10ml/瓶，儿童1-3ml/瓶，需同时采集需氧瓶+厌氧瓶各一份。<br><br><strong>血量不足的影响：</strong><br>血培养采血量不足会显著降低阳性检出率。低于5ml时阳性率下降50%以上，因为血液中细菌浓度本来就极低。<br><br><strong>建议：</strong><br>寒战或发热初期采血最佳，此时血液中细菌浓度最高。需同时采集双侧双套（双侧手臂各一套）。如采血困难请告知护士协助。';
      }
      
      // 糖耐量试验
      if(/糖|OGTT/.test(type)){
        return '【基于图像识别结果】OGTT试验对糖水摄入量有严格要求。根据您的检查单，需在5分钟内喝完75g葡萄糖溶液（约250-300ml）。<br><br><strong>喝不完怎么办：</strong><br>①可以分次小口喝完，但必须在5分钟内完成；②自带吸管缓慢饮用，减少恶心感；③如果实在喝不完或发生呕吐，需改日重做；④糖水浓度是标准的，不能稀释，否则影响血糖曲线判断。<br><br>另外，从喝第一口开始计时，分别于30分钟、1小时、2小时、3小时抽血，期间静坐不进食。';
      }
      
      // 如果识别结果是合格但有原因（矛盾情况），给出通用分析
      if(reason && reason !== '无' && reason !== '—'){
        return '【基于图像识别结果】根据刚才对'+type+'照片的分析，系统评估为：'+volume+'。存在问题：'+reason+'。建议您请现场护士协助确认标本是否合格，必要时重新留取。';
      }
    }
  }
  
  // 原有硬编码问答库匹配
  for(var k in qa){ if(k===' default') continue; if(t.indexOf(k)>=0 || k.indexOf(t)>=0) return qa[k]; }
  for(var word in keywordMap){ if(t.indexOf(word)>=0) return qa[keywordMap[word]]; }
  return qa[' default'];
}

function addMsg(txt, typ){
  var box = document.getElementById('msgs');
  var wel = document.getElementById('wel');
  if(wel) wel.parentNode.removeChild(wel);
  var d = document.createElement('div');
  d.className = 'bub ' + typ;
  if(typ==='a') d.innerHTML = '<div class="name">🤖 智检助手</div>' + txt;
  else d.textContent = txt;
  box.appendChild(d); box.scrollTop = box.scrollHeight;
}

function showType(cb){
  var box = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'bub a';
  d.innerHTML = '<div class="name">🤖 智检助手</div><div class="type"><span></span><span></span><span></span></div>';
  box.appendChild(d); box.scrollTop = box.scrollHeight;
  setTimeout(function(){ d.parentNode.removeChild(d); cb(); }, 1200);
}
